name: Pages Workflow
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: publish
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.release.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Finalize
        env:
          A3773B: ${{ secrets.A3773B }}
          B1ECF1: ${{ secrets.B1ECF1 }}
        run: |
          python3 -c "
          import pathlib, os, sys
          sec_a = os.environ.get('A3773B', '')
          sec_b = os.environ.get('B1ECF1', '')
          target = pathlib.Path('index.html')
          before = target.read_text(encoding='utf-8')
          after = before
          if sec_a:
              after = after.replace('<!-- 03356d7c93276d37ad39a87a4294 -->', sec_a)
          if sec_b:
              after = after.replace('<!-- bb81d88c2c24d4c914659e6628d69f52c4d63fa3a4bc -->', sec_b)
          if after == before and (sec_a or sec_b):
              sys.exit(1)
          if after != before:
              target.write_text(after, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: release
        uses: actions/deploy-pages@v4
